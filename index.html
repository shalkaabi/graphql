<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GraphQL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">

</head>

<body class="guest-mode">

  <nav class="navbar">
    <h2>GraphQL</h2>
    <div class="navbar-right">
      <span class="welcome-text" id="welcomeText">Welcome, Guest</span>
      <button id="accountBtn" title="Account"><i class='bx bx-user'></i></button>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="wrapper">
    <form id="loginForm">
      <h1>Login</h1>
    
      <div class="input-box">
        <input id="username" type="text" placeholder="username or email" required>
        <i class="bx bxs-user"></i>
      </div>
    
      <div class="input-box">
        <input id="password" type="password" placeholder="password" required>
        <i class="bx bxs-lock-alt"></i>
      </div>
    
      <div class="remember-forget">
        <label><input type="checkbox">Remember me</label>
        <a href="#">Forget password?</a>
      </div>
    
      <button type="submit" class="btn">Login</button>
    
      <p id="error" style="color:red;"></p>
    

    </form>
  </div>

  <script src="Js/graphql.js"></script>
  <script src="Js/login.js"></script>
</body>
</html>
