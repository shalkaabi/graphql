<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GraphQL</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
  <script src="shared.js" defer></script>
</head>
<body class="guest-mode">

  <nav class="navbar">
    <h2>GraphQL</h2>
    <div class="navbar-right">
      <span class="welcome-text" id="welcomeText">Welcome, Guest</span>
      <button id="accountBtn" title="Account"><i class='bx bx-user'></i></button>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="wrapper">
    <form action="">
      <h1>Login</h1>
      <div class="input-box">
        <input type="text" placeholder="username" required>
        <i class="bx bxs-user"></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="password" required>
        <i class="bx bxs-lock-alt"></i>
      </div>
      <div class="remember-forget">
        <label><input type="checkbox">Remember me</label>
        <a href="#">Forget password?</a>
      </div>
      <button type="submit" class="btn">Login</button>
      <div class="register-link">
      <p>Don't have an account? <a href="register.html">Register</a></p>
      </div>
    </form>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const user = localStorage.getItem('user') || 'Guest';
      const welcomeText = document.getElementById('welcomeText');
      if (welcomeText) welcomeText.textContent = `Welcome, ${user}`;

      const form = document.querySelector('form');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          const usernameInput = document.querySelector('input[type="text"]:first-of-type');
          const username = usernameInput ? usernameInput.value || 'User' : 'User';
          localStorage.setItem('user', username);
          document.body.classList.remove('guest-mode');
          if (welcomeText) welcomeText.textContent = `Welcome, ${username}`;
          alert(`Logged in as ${username}! Check navbar.`);
        });
      }

      const logoutBtn = document.getElementById('logoutBtn');
      if (logoutBtn) {
        logoutBtn.addEventListener('click', function() {
          localStorage.removeItem('user');
          document.body.classList.add('guest-mode');
          if (welcomeText) welcomeText.textContent = 'Welcome, Guest';
          alert('Logged out!');
        });
      }

      const accountBtn = document.getElementById('accountBtn');
      if (accountBtn) {
        accountBtn.addEventListener('click', function() {
          alert('Account settings - demo!');
        });
      }
    });
  </script>
</body>
</html>
