<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | GraphQL</title>
<link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">

</head>
<body class="guest-mode">
  <nav class="navbar">
    <h2>GraphQL</h2>
    <div class="navbar-right">
      <span class="welcome-text" id="welcomeText">Welcome, Guest</span>
      <button id="accountBtn" title="Account"><i class='bx bx-user'></i></button>
      <button id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="wrapper">
    <form action="">
      <h1>Register</h1>
      <div class="input-row">
        <div class="input-box">
          <input type="text" placeholder="First Name" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="text" placeholder="Last Name" required>
          <i class='bx bxs-user'></i>
        </div>
      </div>
      <div class="input-row">
        <div class="input-box">
          <input type="number" placeholder="Age" min="13" max="120" required>
          <i class='bx bx-calendar'></i>
        </div>
        <div class="input-box">
          <input type="text" placeholder="Gender" required>
          <i class='bx bx-male-female'></i>
        </div>
      </div>
      <div class="input-row">
        <div class="input-box">
          <input type="text" placeholder="Username" required>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box">
          <input type="email" placeholder="Email" required>
          <i class='bx bx-envelope'></i>
        </div>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Password" required>
        <i class='bx bxs-lock-alt'></i>
      </div>
      <div class="input-box">
        <input type="password" placeholder="Confirm Password" required>
        <i class='bx bxs-lock-alt'></i>
      </div>
      <button type="submit" class="btn">Register</button>
      <div class="register-link">
        <p>Already have an account? <a href="index.html">Login</a></p>
      </div>
    </form>
  </div>


</body>
</html>
